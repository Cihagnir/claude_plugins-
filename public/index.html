<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AGENT HIVE</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- ═══ TOP APP BAR ═══ -->
        <header id="header">
            <div class="header-left">
                <div class="header-logo">
                    <span class="material-symbols-outlined">smart_toy</span>
                </div>
                <span class="header-title">Agent Timeline <span id="project-name" class="header-project"></span></span>
                <div class="zoom-controls">
                    <button id="zoom-out" class="zoom-btn" title="Zoom out">
                        <span class="material-symbols-outlined">remove</span>
                    </button>
                    <span id="zoom-level" class="zoom-label">8px/s</span>
                    <button id="zoom-in" class="zoom-btn" title="Zoom in">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>
            <div class="header-right">
                <select id="session-selector" class="header-select"></select>
                <span id="session-count" class="header-meta">0 sessions</span>
                <span id="session-status" class="header-meta">&mdash;</span>
                <span id="event-count" class="header-meta">0 events</span>
                <span id="connection-status" class="header-status disconnected"
                    >OFFLINE</span
                >
            </div>
        </header>

        <!-- ═══ GANTT CHART VIEW ═══ -->
        <section id="gantt-view">
            <div id="gantt-time-axis"></div>
            <div id="gantt-body">
                <div id="gantt-labels"></div>
                <div id="gantt-chart-scroll">
                    <svg id="gantt-svg"></svg>
                    <div id="gantt-now-line"></div>
                </div>
            </div>
            <div id="gantt-tooltip" class="hidden"></div>
            <button id="jump-to-now" class="hidden">
                <span class="material-symbols-outlined">my_location</span>
                Jump to Now
            </button>
        </section>

        <!-- ═══ COMMAND CONSOLE (Footer) ═══ -->
        <footer id="console-footer">
            <div class="console-left">
                <span class="console-dot"></span>
                <span class="console-label">SYSTEM.LIVE</span>
            </div>
            <div id="console-scroll" class="console-scroll">
                <p id="console-text" class="console-text">
                    Awaiting agent activity...
                </p>
            </div>
            <div class="console-right">
                <span class="console-meta" id="console-memory">AGENTS: 0</span>
                <span class="console-meta" id="console-uptime">EVENTS: 0</span>
                <button id="clear-btn" class="console-purge">PURGE</button>
            </div>
        </footer>

        <script src="app.js"></script>
    </body>
</html>
