<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONYX CORE | AGENT HIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══ TOP APP BAR ═══ -->
  <header id="header">
    <div class="header-left">
      <div class="header-logo">
        <span class="material-symbols-outlined">smart_toy</span>
      </div>
      <span class="header-title">ONYX CORE</span>
      <nav class="header-nav">
        <a class="header-nav-link active" data-view="cards">War Room</a>
        <a class="header-nav-link" data-view="timeline">LOGS</a>
      </nav>
    </div>
    <div class="header-right">
      <select id="session-selector" class="header-select">
        <option value="all">ALL_SESSIONS</option>
      </select>
      <span id="session-count" class="header-meta">0 sessions</span>
      <span id="session-status" class="header-meta">—</span>
      <span id="event-count" class="header-meta">0 events</span>
      <span id="connection-status" class="header-status disconnected">OFFLINE</span>
    </div>
  </header>

  <!-- ═══ TACTICAL TABLE VIEW ═══ -->
  <section id="tactical-view" class="tactical-canvas">
    <div class="scanline-overlay"></div>

    <!-- Central Digital Surface -->
    <div id="table-surface" class="table-surface">
      <div class="table-grid-pattern"></div>
      <div class="table-corner tl"><span>GRID_COORDS: [42.1, 88.5]</span></div>
      <div class="table-corner br"><span>ENCRYPTION: AES-512-V2</span></div>
      <div class="table-center">
        <div class="table-label">STRATEGIC SYNC ACTIVE</div>
        <h2 class="table-title">TACTICAL OPERATING TABLE</h2>
        <div class="table-stats">
          <div class="stat-pill green">
            <span class="stat-dot green"></span>
            <span>SYNERGY: <strong id="stat-synergy">—</strong></span>
          </div>
          <div class="stat-pill cyan">
            <span class="stat-dot cyan"></span>
            <span>LATENCY: <strong id="stat-latency">—</strong></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Agent Positions (rendered by JS into these slots) -->
    <div id="slot-top" class="agent-slot slot-top"></div>
    <div id="slot-left" class="agent-slot slot-left"></div>
    <div id="slot-right" class="agent-slot slot-right"></div>
    <div id="slot-bottom" class="agent-slot slot-bottom"></div>
    <!-- Overflow agents go here -->
    <div id="slot-overflow" class="agent-slot slot-overflow"></div>
  </section>

  <!-- ═══ TIMELINE VIEW (hidden by default) ═══ -->
  <section id="timeline-view" style="display:none;">
    <div class="timeline-inner">
      <div id="timeline-container">
        <div id="timeline"></div>
      </div>
    </div>
  </section>

  <!-- ═══ COMMAND CONSOLE (Footer) ═══ -->
  <footer id="console-footer">
    <div class="console-left">
      <span class="console-dot"></span>
      <span class="console-label">SYSTEM.LIVE</span>
    </div>
    <div id="console-scroll" class="console-scroll">
      <p id="console-text" class="console-text">Awaiting agent activity...</p>
    </div>
    <div class="console-right">
      <span class="console-meta" id="console-memory">AGENTS: 0</span>
      <span class="console-meta" id="console-uptime">EVENTS: 0</span>
      <button id="clear-btn" class="console-purge">PURGE</button>
    </div>
  </footer>

  <!-- ═══ EVENT DETAIL MODAL ═══ -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h3>EVENT_PAYLOAD</h3>
        <button id="modal-close">&times;</button>
      </div>
      <pre id="modal-body"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
